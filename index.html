<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZBrush Alpha Map 3D Generator — Multi-Mesh Support (Plane & Sphere)</title>
  <style>
    :root {
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --bg-base: #0d0e12;
      --bg-panel: #1b1d24;
      --border-color: rgba(255,255,255,0.08);
      --text-main: #ffffff;
      --text-sub: #a0a5b5;
      --accent: #63b3ff;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family: var(--font-sans);
      background: var(--bg-base);
      color: var(--text-main);
      overflow: hidden; 
      height: 100vh;
      width: 100vw;
    }
    .app{
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 12px;
      padding: 12px;
      height: 100vh;
      max-height: 100vh;
    }
    .side{
      display: flex;
      flex-direction: column;
      gap: 10px;
      height: 100%;
      overflow: hidden;
    }
    .panel{
      background: var(--bg-panel);
      border: 0.5px solid var(--border-color);
      border-radius: 8px;
      padding: 10px 12px;
    }
    .panel-title{
      font-size: 11px;
      font-weight: 600;
      color: var(--text-sub);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 6px;
    }
    .drop-zone{
      border: 1.5px dashed rgba(255,255,255,0.15);
      border-radius: 6px;
      height: 55px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      gap: 2px;
      transition: .15s;
      position: relative;
    }
    .drop-zone:hover{border-color: var(--accent); background: rgba(255,255,255,0.02)}
    .drop-zone input{position:absolute;inset:0;opacity:0;cursor:pointer}
    .drop-zone i{font-size:16px;color:#6b7280}
    .drop-zone p{font-size:11px;color: var(--text-sub)}

    .thumb-row{display:flex;gap:10px;margin-top:6px;align-items:center}
    .thumb{
      width: 38px;
      height: 38px;
      border-radius: 4px;
      overflow: hidden;
      background: #111;
      flex-shrink: 0;
      border: 0.5px solid rgba(255,255,255,0.1);
    }
    .thumb canvas{width:100%;height:100%;display:block;object-fit:contain;image-rendering:pixelated}
    .thumb-label{font-size:11px;color:#6b7280;line-height:1.2}

    .ctrl-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
    .ctrl-row label{font-size:11px;color: var(--text-sub);min-width:75px}
    .ctrl-row input[type=range]{flex:1;height:4px;cursor:pointer}
    .ctrl-row span{font-size:11px;font-weight:500;min-width:28px;text-align:right}

    .seg-ctrl{display:flex;margin-bottom:6px}
    .seg-ctrl button{flex:1;border-radius:0;border-right-width:0;font-size:10px;padding:4px 2px}
    .seg-ctrl button:first-child{border-radius: 4px 0 0 4px}
    .seg-ctrl button:last-child{border-radius:0 4px 4px 0;border-right-width:0.5px}
    .seg-ctrl button.active{background:#fff;color:#1b1d24;border-color:#fff}

    button{font-size:11px;padding:5px 10px;border-radius:4px;border:0.5px solid rgba(255,255,255,0.2);background:transparent;color:#fff;cursor:pointer;transition:0.15s}
    button:hover{background:rgba(255,255,255,0.05)}
    button.primary{background:#fff;color:#1b1d24;border-color:transparent;font-weight:500}
    button.primary:hover{opacity:.9}
    .btn-row{display:flex;gap:6px;margin-top:4px}
    .btn-row button{flex:1}
    
    #fadeRegionContainer {
      display: flex;
      justify-content: center;
      width: 100%;
      margin-top: 4px;
    }
    #fadeRegionWrap{
      position:relative;
      width: 100%;                 
      aspect-ratio: 1 / 1;         
      background:#111;
      border-radius:6px;
      overflow:hidden;
      border: 0.5px solid rgba(255,255,255,0.15);
    }
    #regionPreview{width:100%;height:100%;object-fit:contain;background:#111;image-rendering:pixelated}

    .hero{
      position:relative;
      border-radius:8px;
      overflow:hidden;
      background:#14161d;
      height: 100%;
      width: 100%;
      display:flex;
      align-items:center;
      justify-content:center;
      border:0.5px solid var(--border-color);
    }
    .hero canvas{display:block; width: 100% !important; height: 100% !important;}
    .hero-label{position:absolute;top:12px;left:14px;font-size:10px;color:rgba(255,255,255,.4);font-weight:600;letter-spacing:.08em;text-transform:uppercase}
    .hero-hint{position:absolute;bottom:12px;left:14px;font-size:10px;color:rgba(255,255,255,.35)}
    .toggle-row{display:flex;gap:6px;position:absolute;top:12px;right:12px;z-index:10}
    .toggle-row button{font-size:10px;padding:5px 8px;background:rgba(0,0,0,0.5);border-color:rgba(255,255,255,0.15);backdrop-filter:blur(4px)}
    .toggle-row button.active{background:#fff;color:#111;border-color:transparent}
    .empty-state{color:rgba(255,255,255,.35);font-size:12px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:6px;position:absolute;z-index:2}
    .empty-state i{font-size:24px}
  </style>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body>

<div class="app">

  <div class="side">
    <div class="panel">
      <div class="panel-title">Image Input</div>
      <div id="dropZone" class="drop-zone">
        <input type="file" id="fileIn" accept="image/*">
        <i class="ti ti-upload" aria-hidden="true"></i>
        <p>Click or Drop Image</p>
      </div>
      <div class="thumb-row">
        <div class="thumb"><canvas id="srcCanvas"></canvas></div>
        <div class="thumb"><canvas id="outCanvas"></canvas></div>
        <span class="thumb-label" id="infoLabel">No image loaded</span>
      </div>
    </div>

    <div class="panel" style="flex: 1; display: flex; flex-direction: column; justify-content: space-between; min-height: 0;">
      <div>
        <div class="panel-title">Alpha Tuning</div>
        <div class="seg-ctrl" id="chanSeg">
          <button class="active" data-v="luminance">Luma</button>
          <button data-v="red">R</button>
          <button data-v="green">G</button>
          <button data-v="blue">B</button>
          <button data-v="alpha">A</button>
        </div>

        <div class="ctrl-row">
          <label>Brightness</label>
          <input type="range" id="brightness" min="-100" max="100" step="1" value="0">
          <span id="brightnessV">0</span>
        </div>
        <div class="ctrl-row">
          <label>Contrast</label>
          <input type="range" id="contrast" min="-100" max="100" step="1" value="0">
          <span id="contrastV">0</span>
        </div>
        <div class="ctrl-row">
          <label>Gamma</label>
          <input type="range" id="gamma" min="10" max="300" step="1" value="100">
          <span id="gammaV">1.0</span>
        </div>
        <div class="ctrl-row">
          <label>Blur Map</label>
          <input type="range" id="blur" min="0" max="20" step="0.5" value="0">
          <span id="blurV">0</span>
        </div>
        
        <div class="ctrl-row" style="background: rgba(99,179,255,0.06); padding: 6px; border-radius: 4px; border: 0.5px solid rgba(99,179,255,0.2);">
          <label style="color: var(--accent); font-weight: 500;">Outer Fade</label>
          <input type="range" id="objectFade" min="0" max="60" step="1" value="0">
          <span id="objectFadeV" style="color: var(--accent);">0</span>
        </div>
      </div>

      <div id="fadeRegionContainer">
        <div id="fadeRegionWrap">
          <canvas id="regionPreview"></canvas>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">3D Mesh & Save</div>
      <div class="panel-title" style="font-size: 10px; margin-bottom: 4px; color:var(--text-sub)">3D Shape Profile</div>
      <div class="seg-ctrl" id="meshTypeSeg">
        <button class="active" data-v="plane"><i class="ti ti-square" style="font-size:11px; margin-right:3px"></i>Plane</button>
        <button data-v="sphere"><i class="ti ti-circle-dot" style="font-size:11px; margin-right:3px"></i>Sphere</button>
      </div>

      <div class="ctrl-row">
        <label>Displace</label>
        <input type="range" id="dispScale" min="0" max="100" step="1" value="5">
        <span id="dispScaleV">5</span>
      </div>
      <div class="ctrl-row">
        <label>Grid Detail</label>
        <input type="range" id="dispSeg" min="32" max="512" step="8" value="256">
        <span id="dispSegV">256</span>
      </div>
      <div class="btn-row">
        <button class="primary" id="exportPNG"><i class="ti ti-download" style="margin-right:2px"></i>Export PNG</button>
        <button id="resetBtn"><i class="ti ti-refresh" style="margin-right:2px"></i>Reset</button>
      </div>
    </div>
  </div>

  <div class="hero" id="threeWrap">
    <span class="hero-label" id="meshLabel">3D Alpha Preview</span>
    <div class="toggle-row">
      <button id="wireBtn" title="Wireframe Mesh"><i class="ti ti-grid-dots"></i></button>
      <button id="rotBtn" title="Auto Turn"><i class="ti ti-rotate"></i></button>
    </div>
    <div class="empty-state" id="emptyState">
      <i class="ti ti-photo-up"></i>
      <span>Load image to preview 3D volume</span>
    </div>
    <span class="hero-hint" id="heroHint" style="display:none">Left-click and drag to rotate view</span>
  </div>

</div>

<script>
const $ = id => document.getElementById(id);
let srcImg = null, srcW = 0, srcH = 0;
let channel = 'luminance';
let currentMeshType = 'plane'; 
const PROC_RES = 512; 

const meshSettings = {
  plane: { disp: 5, seg: 256 },
  sphere: { disp: 10, seg: 512 }
};

const sliders = [
  ['brightness','brightnessV',v=>v],
  ['contrast','contrastV',v=>v],
  ['gamma','gammaV',v=>(v/100).toFixed(1)],
  ['blur','blurV',v=>v],
  ['objectFade','objectFadeV',v=>v]
];
sliders.forEach(([id,vid,fmt])=>{
  const el=$(id), out=$(vid);
  el.addEventListener('input',()=>{ out.textContent=fmt(el.value); render(); });
});

function segSetup(id, cb){
  const wrap=$(id);
  wrap.querySelectorAll('button').forEach(btn=>{
    btn.addEventListener('click',()=>{
      wrap.querySelectorAll('button').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      cb(btn.dataset.v);
    });
  });
}
segSetup('chanSeg', v=>{channel=v; render();});

segSetup('meshTypeSeg', v=>{
  currentMeshType = v; 
  $('meshLabel').textContent = `3D Displaced ${v}`;
  
  $('dispScale').value = meshSettings[v].disp;
  $('dispScaleV').textContent = meshSettings[v].disp;
  
  $('dispSeg').value = meshSettings[v].seg;
  $('dispSegV').textContent = meshSettings[v].seg;
  
  rebuildGeometry(); 
  applyDisplacement();
});

function handleImageProcessed(img, w, h) {
  srcImg = img; srcW = w; srcH = h;
  
  const sc = $('srcCanvas'); sc.width = 64; sc.height = 64;
  const sctx = sc.getContext('2d');
  sctx.fillStyle = "#000000"; sctx.fillRect(0,0,64,64);
  
  const maxDim = Math.max(srcW, srcH);
  const nw = (srcW / maxDim) * 64;
  const nh = (srcH / maxDim) * 64;
  sctx.drawImage(img, (64-nw)/2, (64-nh)/2, nw, nh);

  $('infoLabel').textContent = `${srcW}×${srcH}px`;
  $('emptyState').style.display = 'none';
  $('heroHint').style.display = 'block';
  render();
}

function loadFile(f){
  if(!f) return;
  const url=URL.createObjectURL(f);
  const img=new Image();
  img.onload=()=>{
    handleImageProcessed(img, img.width, img.height);
  };
  img.src=url;
}
$('fileIn').addEventListener('change', e=> loadFile(e.target.files[0]));
$('dropZone').addEventListener('dragover',e=>{e.preventDefault();$('dropZone').style.background='rgba(255,255,255,0.03)'});
$('dropZone').addEventListener('dragleave',()=>$('dropZone').style.background='');
$('dropZone').addEventListener('drop',e=>{
  e.preventDefault(); $('dropZone').style.background='';
  loadFile(e.dataTransfer.files[0]);
});

function gaussKernel(r){
  const s=r||0.01, size=Math.max(3,Math.round(s*2)*2+1);
  const k=[]; const c=Math.floor(size/2);
  for(let y=0;y<size;y++) for(let x=0;x<size;x++) k.push(Math.exp(-((x-c)**2+(y-c)**2)/(2*s*s)));
  return {k,size};
}
function convolve(data, w, h, kernel, kSize){
  const out=new Uint8Array(data.length);
  const half=Math.floor(kSize/2);
  for(let y=0;y<h;y++) for(let x=0;x<w;x++){
    let s=0,ksum=0;
    for(let ky=0;ky<kSize;ky++) for(let kx=0;kx<kSize;kx++){
      const sy=Math.min(Math.max(y+ky-half,0),h-1);
      const sx=Math.min(Math.max(x+kx-half,0),w-1);
      s+=data[(sy*w+sx)*4]*kernel[ky*kSize+kx]; ksum+=kernel[ky*kSize+kx];
    }
    const i=(y*w+x)*4;
    out[i]=out[i+1]=out[i+2]=Math.min(255,Math.max(0,ksum>0?s/ksum:s)); out[i+3]=255;
  }
  return out;
}

function getExteriorBackgroundMask(data, w, h, threshold = 25) {
  const mask = new Uint8Array(w * h);
  const queue = [];
  for (let x = 0; x < w; x++) {
    if (data[(0 * w + x) * 4] < threshold) { mask[0 * w + x] = 1; queue.push(x, 0); }
    if (data[((h - 1) * w + x) * 4] < threshold) { mask[(h - 1) * w + x] = 1; queue.push(x, h - 1); }
  }
  for (let y = 0; y < h; y++) {
    if (data[(y * w + 0) * 4] < threshold) { mask[y * w + 0] = 1; queue.push(0, y); }
    if (data[(y * w + (w - 1)) * 4] < threshold) { mask[y * w + (w - 1)] = 1; queue.push(w - 1, y); }
  }
  const dx = [1, -1, 0, 0]; const dy = [0, 0, 1, -1];
  let head = 0;
  while (head < queue.length) {
    const cx = queue[head++]; const cy = queue[head++];
    for (let i = 0; i < 4; i++) {
      const nx = cx + dx[i]; const ny = cy + dy[i];
      if (nx >= 0 && nx < w && ny >= 0 && ny < h) {
        const idx = ny * w + nx;
        if (mask[idx] === 0 && data[idx * 4] < threshold) { mask[idx] = 1; queue.push(nx, ny); }
      }
    }
  }
  return mask;
}

function computeExteriorDistanceField(data, w, h, threshold = 25) {
  const dist = new Float32Array(w * h); dist.fill(Infinity);
  const bgMask = getExteriorBackgroundMask(data, w, h, threshold);
  for (let i = 0; i < w * h; i++) { if (bgMask[i] === 1) dist[i] = 0; }
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const idx = y * w + x;
      if (dist[idx] !== 0) {
        let d1 = (x > 0) ? dist[idx - 1] + 1 : Infinity;
        let d2 = (y > 0) ? dist[idx - w] + 1 : Infinity;
        dist[idx] = Math.min(dist[idx], d1, d2);
      }
    }
  }
  for (let y = h - 1; y >= 0; y--) {
    for (let x = w - 1; x >= 0; x--) {
      const idx = y * w + x;
      if (dist[idx] !== 0) {
        let d1 = (x < w - 1) ? dist[idx + 1] + 1 : Infinity;
        let d2 = (y < h - 1) ? dist[idx + w] + 1 : Infinity;
        dist[idx] = Math.min(dist[idx], d1, d2);
      }
    }
  }
  return dist;
}

function render(){
  if(!srcImg) return;
  const size = PROC_RES;
  const tmp=document.createElement('canvas');
  tmp.width=size; tmp.height=size;
  const tc=tmp.getContext('2d');
  
  tc.fillStyle = "#000000";
  tc.fillRect(0,0,size,size);
  const maxDim = Math.max(srcW, srcH);
  const nw = (srcW / maxDim) * size;
  const nh = (srcH / maxDim) * size;
  tc.drawImage(srcImg, (size-nw)/2, (size-nh)/2, nw, nh);
  
  let d=tc.getImageData(0,0,size,size).data;

  const bv=+$('brightness').value, cv=+$('contrast').value, gv=+$('gamma').value/100;
  const lut=new Uint8Array(256);
  for(let i=0;i<256;i++){
    let v=(i+bv-128)*(1+cv/100)+128;
    v=255*Math.pow(Math.min(255,Math.max(0,v))/255,1/gv);
    lut[i]=v;
  }

  const grayId=new ImageData(size,size);
  for(let i=0;i<size*size;i++){
    const r=d[i*4],g=d[i*4+1],b=d[i*4+2],a=d[i*4+3];
    let v = (channel==='red')?r:(channel==='green')?g:(channel==='blue')?b:(channel==='alpha')?a:Math.round(0.2126*r+0.7152*g+0.0722*b);
    grayId.data[i*4]=grayId.data[i*4+1]=grayId.data[i*4+2]=lut[v]; grayId.data[i*4+3]=255;
  }
  tc.putImageData(grayId,0,0);

  if(+$('blur').value>0){
    const {k,size:ks}=gaussKernel(+$('blur').value);
    const blurred=convolve(tc.getImageData(0,0,size,size).data,size,size,k,ks);
    grayId.data.set(blurred); tc.putImageData(grayId,0,0);
  }

  const oc=$('outCanvas'); oc.width=size; oc.height=size;
  oc.getContext('2d').drawImage(tmp,0,0);

  const fadeRange = +$('objectFade').value;
  if (fadeRange > 0) {
    const octx = oc.getContext('2d');
    const fid = octx.getImageData(0,0,size,size);
    const fd = fid.data;
    const distField = computeExteriorDistanceField(fd, size, size, 25);

    for (let i = 0; i < size * size; i++) {
      const distVal = distField[i];
      if (distVal > 0 && distVal <= fadeRange) {
        let factor = distVal / fadeRange;
        factor = Math.min(1, Math.max(0, factor));
        let smoothFactor = factor * factor * (3 - 2 * factor);
        fd[i * 4]     *= smoothFactor;
        fd[i * 4 + 1] *= smoothFactor;
        fd[i * 4 + 2] *= smoothFactor;
      }
    }
    octx.putImageData(fid, 0, 0);
  }

  $('regionPreview').width=size; $('regionPreview').height=size;
  $('regionPreview').getContext('2d').drawImage(oc,0,0);
  applyDisplacement();
}

$('exportPNG').addEventListener('click',()=>{
  const oc=$('outCanvas'); if(!oc.width) return;
  const a=document.createElement('a'); a.download='alpha_smart_fade.png'; a.href=oc.toDataURL('image/png'); a.click();
});

$('resetBtn').addEventListener('click',()=>{
  document.querySelectorAll('input[type=range]').forEach(el=>{el.value=el.defaultValue});
  ['brightness','contrast'].forEach(id=>$(id+'V').textContent='0');
  $('gammaV').textContent='1.0'; $('blurV').textContent='0'; $('objectFadeV').textContent='0';
  
  meshSettings.plane.disp = 5;
  meshSettings.plane.seg = 256;
  meshSettings.sphere.disp = 10;
  meshSettings.sphere.seg = 512;
  
  currentMeshType = 'plane';
  $('dispScale').value = meshSettings.plane.disp;
  $('dispScaleV').textContent = meshSettings.plane.disp;
  $('dispSeg').value = meshSettings.plane.seg;
  $('dispSegV').textContent = meshSettings.plane.seg;

  document.querySelectorAll('#meshTypeSeg button').forEach(b=>b.classList.remove('active'));
  document.querySelector('#meshTypeSeg button[data-v="plane"]').classList.add('active');
  $('meshLabel').textContent="3D Alpha Preview";
  
  autoRotate = false;
  $('rotBtn').classList.remove('active');
  
  rebuildGeometry(); render();
});

// ===== THREE.JS ENGINE =====
let three = {scene:null, camera:null, renderer:null, mesh:null, geom:null, baseGeom:null};
let dragState = {down:false, x:0, y:0, rotX:-0.55, rotY:0.3};
let autoRotate = false, wireframe = false;

$('dispScale').addEventListener('input', ()=>{ 
  const val = +$('dispScale').value;
  $('dispScaleV').textContent = val; 
  meshSettings[currentMeshType].disp = val; 
  applyDisplacement(); 
});

$('dispSeg').addEventListener('input', ()=>{ 
  const val = +$('dispSeg').value;
  $('dispSegV').textContent = val; 
  meshSettings[currentMeshType].seg = val;  
  rebuildGeometry(); 
  applyDisplacement(); 
});

$('wireBtn').addEventListener('click', ()=>{ wireframe = !wireframe; $('wireBtn').classList.toggle('active', wireframe); if(three.mesh) three.mesh.material.wireframe = wireframe; });
$('rotBtn').addEventListener('click', ()=>{ autoRotate = !autoRotate; $('rotBtn').classList.toggle('active', autoRotate); });

function initThree(){
  const wrap = $('threeWrap');
  let w = wrap.clientWidth, h = wrap.clientHeight;
  
  three.scene = new THREE.Scene();
  three.camera = new THREE.PerspectiveCamera(38, w/h, 0.1, 100);
  three.camera.position.set(0, 0, 3.2); 
  three.camera.lookAt(0,0,0);

  three.renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
  three.renderer.setSize(w, h);
  three.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  wrap.insertBefore(three.renderer.domElement, wrap.firstChild);

  three.scene.add(new THREE.AmbientLight(0xffffff, 0.6));
  const dl = new THREE.DirectionalLight(0xffffff, 1.2); dl.position.set(2,3,4); three.scene.add(dl);
  const dl2 = new THREE.DirectionalLight(0x88aaff, 0.4); dl2.position.set(-2,-3,-4); three.scene.add(dl2);

  $('dispScale').value = meshSettings[currentMeshType].disp;
  $('dispScaleV').textContent = meshSettings[currentMeshType].disp;
  $('dispSeg').value = meshSettings[currentMeshType].seg;
  $('dispSegV').textContent = meshSettings[currentMeshType].seg;

  rebuildGeometry();
  const mat = new THREE.MeshStandardMaterial({color:0x7d828c, side:THREE.DoubleSide, wireframe:false, roughness:0.65, metalness:0.1});
  three.mesh = new THREE.Mesh(three.geom, mat); three.scene.add(three.mesh);

  const dom = three.renderer.domElement; dom.style.touchAction='none';
  dom.addEventListener('pointerdown', e=>{ dragState.down=true; dragState.x=e.clientX; dragState.y=e.clientY; });
  window.addEventListener('pointerup', ()=>{ dragState.down=false; });
  window.addEventListener('pointermove', e=>{
    if(!dragState.down) return;
    dragState.rotY += (e.clientX-dragState.x)*0.007; dragState.rotX += (e.clientY-dragState.y)*0.007;
    dragState.x=e.clientX; dragState.y=e.clientY;
    dragState.rotX = Math.max(-1.4, Math.min(1.4, dragState.rotX));
  });

  window.addEventListener('resize', ()=>{
    const nw = wrap.clientWidth; const nh = wrap.clientHeight;
    three.camera.aspect = nw / nh; three.camera.updateProjectionMatrix();
    three.renderer.setSize(nw, nh);
  });
  setTimeout(() => { window.dispatchEvent(new Event('resize')); }, 60);
  animate();
}

function rebuildGeometry(){
  const seg = meshSettings[currentMeshType].seg; 
  if(three.geom) three.geom.dispose();

  if(currentMeshType === 'sphere') {
    three.geom = new THREE.SphereGeometry(0.9, seg, Math.floor(seg/2));
  } else {
    three.geom = new THREE.PlaneGeometry(2, 2, seg, seg);
  }
  
  three.baseGeom = revolutionaryClone(three.geom.attributes.position.array);
  if(three.mesh) {
    three.mesh.geometry = three.geom;
    three.mesh.material.wireframe = wireframe;
  }
}

function revolutionaryClone(arr) {
  const target = new Float32Array(arr.length);
  target.set(arr);
  return target;
}

function applyDisplacement(){
  if(!three.geom || !$('outCanvas').width) return;
  
  const oc = $('outCanvas');
  const size = oc.width;
  
  const pos = three.geom.attributes.position;
  const base = three.baseGeom;
  
  const scale = (meshSettings[currentMeshType].disp)/100 * 0.5;

  const ctx = oc.getContext('2d');
  const imgData = ctx.getImageData(0, 0, size, size).data;

  function getPixelLuma(u, v) {
    const x = Math.min(size - 1, Math.max(0, Math.floor(u * size)));
    const y = Math.min(size - 1, Math.max(0, Math.floor((1 - v) * size)));
    return imgData[(y * size + x) * 4] / 255;
  }

  const uvAttr = three.geom.attributes.uv;

  for(let i = 0; i < pos.count; i++) {
    let u = uvAttr.getX(i);
    let v = uvAttr.getY(i);

    if(currentMeshType === 'sphere') {
      const bx = base[i*3];
      const by = base[i*3+1];
      u = (bx / 1.44) + 0.5;
      v = (by / 1.44) + 0.5;
    }

    let heightFactor = getPixelLuma(u, v);

    if (u < 0 || u > 1 || v < 0 || v > 1) {
      heightFactor = 0;
    }

    if(currentMeshType === 'sphere') {
      const bx = base[i*3];
      const by = base[i*3+1];
      const bz = base[i*3+2];
      
      const length = Math.sqrt(bx*bx + by*by + bz*bz);
      const nx = bx / length;
      const ny = by / length;
      const nz = bz / length;

      if (bz > 0) {
        const displacement = heightFactor * scale;
        pos.array[i*3]   = bx + nx * displacement;
        pos.array[i*3+1] = by + ny * displacement;
        pos.array[i*3+2] = bz + nz * displacement;
      } else {
        pos.array[i*3]   = bx;
        pos.array[i*3+1] = by;
        pos.array[i*3+2] = bz;
      }
    } else {
      pos.array[i*3+2] = base[i*3+2] + heightFactor * scale * 1.4;
    }
  }
  
  pos.needsUpdate = true; 
  three.geom.computeVertexNormals();
}

function animate(){
  requestAnimationFrame(animate);
  if(!three.renderer) return;
  if(autoRotate && !dragState.down) dragState.rotY += 0.003;
  if(three.mesh){ three.mesh.rotation.x = dragState.rotX; three.mesh.rotation.y = dragState.rotY; }
  three.renderer.render(three.scene, three.camera);
}

// ฟังก์ชันสำหรับดึงไฟล์ภาพเริ่มต้น alpha_map.png
function loadDefaultImage() {
  const img = new Image();
  img.crossOrigin = "anonymous"; 
  img.src = "alpha_map.png"; 
  
  img.onload = () => {
    handleImageProcessed(img, img.width, img.height);
  };
  img.onerror = () => {
    console.log("ไม่สามารถดึงภาพเริ่มต้นได้เนื่องจากข้อจำกัดของระบบเบราว์เซอร์ต้นทาง");
  };
}

if(typeof THREE !== 'undefined') {
  initThree();
  loadDefaultImage();
} else {
  const s = document.createElement('script'); s.src = 'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js';
  s.onload = () => {
    initThree();
    loadDefaultImage();
  };
  document.head.appendChild(s);
}
</script>
